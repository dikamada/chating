<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat HVC Telkomsel</title>
    <style>
        /* CSS Reset & Variable */
        *, *::before, *::after { box-sizing: border-box; }
        
        :root {
            --bg-app: #121212;
            --bg-panel: #1c1c1c;
            --bg-chat-area: rgba(18, 18, 18, 0.85);
            --bg-input: #1e1e1e;
            --bg-textarea: #2b2b2b;
            --text-main: #ffffff;
            --border-color: #333333;
        }

        [data-theme="light"] {
            --bg-app: #f0f2f5;
            --bg-panel: #ffffff;
            --bg-chat-area: rgba(240, 242, 245, 0.85);
            --bg-input: #f0f0f0;
            --bg-textarea: #ffffff;
            --text-main: #000000;
            --border-color: #cccccc;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-app); color: var(--text-main); 
            overflow: hidden; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Struktur Utama dengan Hiasan Garis Kiri Kanan */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            border-left: 4px ridge #ffcc00;
            border-right: 4px ridge #ffcc00;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Header Gaya Calculator Font & Warna Kuning */
        header {
            background-color: var(--bg-panel);
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #ffcc00;
            flex-shrink: 0;
        }
        h1 {
            color: #ffcc00;
            margin: 0 0 5px 0;
            font-size: 22px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.6);
            letter-spacing: 1px;
        }
        #live-clock {
            font-family: 'Courier New', Courier, monospace;
            color: #ffcc00;
            font-size: 13px;
            background: #000;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            border: 1px solid #333;
        }

        /* Area Chat Box dengan Custom Scrollbar di Kanan */
        .chat-area {
            flex: 1;
            overflow-y: scroll;
            padding: 15px;
            background-color: var(--bg-chat-area);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Memastikan Scrollbar Selalu Muncul di Kanan */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }

        /* Bubble Chat Auto Rata ke Bawah */
        .msg-row {
            display: flex;
            width: 100%;
            margin-bottom: 2px;
        }
        .msg-row.penerima { justify-content: flex-start; } /* User 1 */
        .msg-row.pengirim { justify-content: flex-end; }  /* Istri */
        .msg-row.other { justify-content: flex-start; }    /* Kakak */

        .msg-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: inline-block;
        }
        .msg-user-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
            opacity: 0.9;
        }

        /* Warna Bubble Sesuai Permintaan */
        .penerima .msg-bubble {
            background-color: #0054a6; /* Biru */
            color: #ffffff;            /* Tulisan Putih */
            border-top-left-radius: 2px;
        }
        .pengirim .msg-bubble {
            background-color: #d32f2f; /* Merah (Istri) */
            color: #ffcc00;            /* Tulisan Kuning */
            border-top-right-radius: 2px;
        }
        .other .msg-bubble {
            background-color: #2e7d32; /* Hijau (Kakak) */
            color: #ffffff;
            border-top-left-radius: 2px;
        }

        /* Media */
        .chat-media {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 5px;
        }
        .chat-sticker {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin-top: 5px;
        }
        .msg-time {
            font-size: 9px;
            display: block;
            text-align: right;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Control Panel */
        .control-panel {
            background-color: var(--bg-panel);
            padding: 8px 12px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-size: 12px;
        }
        .wp-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .wp-btn-wrapper input[type=file] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%; cursor: pointer;
        }
        .custom-btn {
            background: #333; color: #ffcc00; border: 1px solid #ffcc00;
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .custom-btn:hover { background: #ffcc00; color: #000; }
        
        select {
            background: #222; color: #fff; border: 1px solid #555;
            padding: 4px; border-radius: 4px; outline: none;
        }

        /* Input Area */
        .input-container {
            background-color: var(--bg-input);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 2px solid #ffcc00;
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        textarea {
            flex: 1;
            background-color: var(--bg-textarea);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            resize: none;
            height: 40px;
            max-height: 120px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        textarea:focus { border-color: #ffcc00; }
        
        .send-btn {
            background-color: #ffcc00; color: #000; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .media-pickers {
            display: flex; gap: 10px; font-size: 12px; align-items: center;
        }
        .media-pickers label {
            cursor: pointer; color: #ffcc00; display: flex; align-items: center; gap: 4px;
            background: #2a2a2a; padding: 4px 10px; border-radius: 12px; border: 1px solid #444;
        }
        .media-pickers input[type="file"] { display: none; }

        footer {
            background-color: var(--bg-app); text-align: center;
            padding: 6px; font-size: 11px; color: #888;
            border-top: 1px solid var(--border-color); flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <!-- HEADER -->
    <header>
        <h1>CHAT HVC TELKOMSEL</h1>
        <div id="live-clock">00/00/0000 00:00:00</div>
    </header>

    <!-- CONTROL PANEL -->
    <div class="control-panel">
        <div class="wp-btn-wrapper">
            <button class="custom-btn">🖼️ Ubah BG</button>
            <input type="file" id="wp-input" accept="image/jpeg, image/png">
        </div>
        <button class="custom-btn" id="clear-wp-btn">❌ Hapus BG</button>
        <button class="custom-btn" id="theme-toggle-btn">🌓 Mode</button>
        <div>
            <select id="user-select">
                <option value="istri">Istri (Merah/Kuning)</option>
                <option value="user1">User 1 (Biru/Putih)</option>
                <option value="kakak">Kakak (Hijau/Putih)</option>
            </select>
        </div>
    </div>

    <!-- AREA CHAT BOX -->
    <div class="chat-area" id="chatArea">
        <div class="msg-row penerima">
            <div class="msg-bubble">
                <span class="msg-user-name">User 1</span>
                Selamat datang di Chat HVC Telkomsel. Silakan kirim pesan!
                <span class="msg-time">08:00</span>
            </div>
        </div>
    </div>

    <!-- INPUT CONTAINER -->
    <div class="input-container">
        <div class="media-pickers">
            <label>📷 Gambar/Sticker <input type="file" id="media-input" accept="image/*"></label>
            <label>🎥 Video <input type="file" id="video-input" accept="video/*"></label>
        </div>
        <div class="input-row">
            <textarea id="chatInput" placeholder="Ketik pesan di sini..."></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        Telkomsel HVC MogiCoding 2026
    </footer>
</div>

<script>
    const API_URL = "https://api.npoint.io/8da8f76e45236f287087";

    const chatArea = document.getElementById('chatArea');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const userSelect = document.getElementById('user-select');
    const wpInput = document.getElementById('wp-input');
    const clearWpBtn = document.getElementById('clear-wp-btn');
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    const appContainer = document.getElementById('appContainer');
    const mediaInput = document.getElementById('media-input');
    const videoInput = document.getElementById('video-input');

    // 1. Live Clock System
    function updateClock() {
        const now = new Date();
        const tgl = String(now.getDate()).padStart(2, '0');
        const bln = String(now.getMonth() + 1).padStart(2, '0');
        const thn = now.getFullYear();
        const jam = String(now.getHours()).padStart(2, '0');
        const menit = String(now.getMinutes()).padStart(2, '0');
        const detik = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('live-clock').innerText = `${tgl}/${bln}/${thn} ${jam}:${menit}:${detik}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Wallpaper System (Upload & Hapus)
    wpInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                appContainer.style.backgroundImage = `url('${event.target.result}')`;
            };
            reader.readAsDataURL(file);
        }
    });

    clearWpBtn.addEventListener('click', function() {
        appContainer.style.backgroundImage = 'none';
        wpInput.value = '';
    });

    // 3. Dark/Light Mode Toggle
    themeToggleBtn.addEventListener('click', function() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'light') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    });

    // Textarea Auto-expand
    chatInput.addEventListener('input', function() {
        this.style.height = '40px';
        this.style.height = (this.scrollHeight) + 'px';
    });

    // 4. Sinkronisasi Data Pesan Cloud
    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) return;
            const data = await res.json();
            if (!data || !data.messages) return;
            renderChat(data.messages);
        } catch (error) {
            console.error("Error loading messages:", error);
        }
    }

    function renderChat(messages) {
        const isAtBottom = chatArea.scrollHeight - chatArea.clientHeight <= chatArea.scrollTop + 50;
        chatArea.innerHTML = '';
        
        messages.forEach(m => {
            const row = document.createElement('div');
            let roleClass = 'penerima';
            let displayName = 'User 1';
            
            if (m.user === 'istri') {
                roleClass = 'pengirim';
                displayName = 'Istri';
            } else if (m.user === 'kakak') {
                roleClass = 'other';
                displayName = 'Kakak';
            } else if (m.user === 'user1') {
                roleClass = 'penerima';
                displayName = 'User 1';
            } else {
                roleClass = 'penerima';
                displayName = m.user;
            }

            row.className = `msg-row ${roleClass}`;

            let contentHTML = '';
            if (m.type === 'text') {
                contentHTML = m.text;
            } else if (m.type === 'image') {
                contentHTML = `<img src="${m.text}" class="chat-media">`;
            } else if (m.type === 'video') {
                contentHTML = `<video src="${m.text}" class="chat-media" controls></video>`;
            } else if (m.type === 'sticker') {
                contentHTML = `<img src="${m.text}" class="chat-sticker">`;
            }

            row.innerHTML = `
                <div class="msg-bubble">
                    <span class="msg-user-name">${displayName}</span>
                    <div>${contentHTML}</div>
                    <span class="msg-time">${m.time || ''}</span>
                </div>
            `;
            chatArea.appendChild(row);
        });

        if (isAtBottom) {
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    }

    setInterval(loadMessages, 3000);
    loadMessages();

    // 5. Kirim Data ke Cloud Npoint
    async function sendData(msgContent, contentType = 'text') {
        const currentUser = userSelect.value;
        const now = new Date();
        const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

        try {
            const res = await fetch(API_URL);
            let currentData = { messages: [] };
            if (res.ok) {
                currentData = await res.json();
                if (!currentData.messages) currentData.messages = [];
            }

            currentData.messages.push({
                user: currentUser,
                text: msgContent,
                type: contentType,
                time: timeStr
            });

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentData)
            });

            chatInput.value = '';
            chatInput.style.height = '40px';
            renderChat(currentData.messages);
            chatArea.scrollTop = chatArea.scrollHeight;
        } catch (error) {
            alert("Gagal terhubung ke database cloud!");
        }
    }

    sendBtn.addEventListener('click', () => {
        const text = chatInput.value.trim();
        if (text) sendData(text, 'text');
    });

    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    // 6. Media Upload (Auto-Hapus 30 Hari via Litterbox)
    async function handleMediaUpload(file, type) {
        if (!file) return;
        chatInput.placeholder = "Mengunggah media temporary (30 hari)...";
        chatInput.disabled = true;

        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("time", "720h"); // 30 Hari
        formData.append("fileToUpload", file);

        try {
            const response = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://litterbox.catbox.moe/resources/internals/api.php"), {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                const uploadedUrl = await response.text();
                sendData(uploadedUrl, type);
            } else {
                alert("Gagal mengunggah.");
            }
        } catch (error) {
            alert("Terjadi kesalahan koneksi.");
        } finally {
            chatInput.placeholder = "Ketik pesan di sini...";
            chatInput.disabled = false;
            mediaInput.value = '';
            videoInput.value = '';
        }
    }

    mediaInput.addEventListener('change', function(e) {
        const isSticker = confirm("Kirim sebagai STICKER?\n(OK = Ukuran pas sticker, Cancel = Gambar biasa)");
        handleMediaUpload(e.target.files[0], isSticker ? 'sticker' : 'image');
    });

    videoInput.addEventListener('change', function(e) {
        handleMediaUpload(e.target.files[0], 'video');
    });
</script>
</body>
</html>
